version: "3.8"

services:
  db:
    image: postgres:15
    container_name: hms_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hms
    ports:
      - "5433:5432"
    volumes:
      - hms_data:/var/lib/postgresql/data

volumes:
  hms_data:
